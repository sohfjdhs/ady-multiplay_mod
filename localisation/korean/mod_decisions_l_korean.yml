l_korean:
 EGY_Anglo_Egyptian_treaty:0 "영국-이집트 조약"
 EGY_Anglo_Egyptian_treaty_desc:0 "우리는 이번 조약으로 카이로의 영국군을 수에즈 운하로 몰아내고 치외법권을 폐지해 주권 국가의 기틀을 세울 것입니다. 영국군이 완전히 물러나지 않는 한계는 있지만, 파시스트 이탈리아의 침략 위협이 당장 눈앞에 닥친 지금, 영국의 군사력을 방패 삼아 국방을 지키면서 진정한 독립으로 나아가는 실리적인 발판을 마련하겠습니다."
 EGY_start_Anglo_Egyptian_treaty:0 "영국-이집트 조약 채결"

 EGY_parliament:0 "이집트 의회"
 EGY_parliament_desc:0 "이집트는 엄현히 국가로 인정받고있는 상태입니다. 왕의 권한이 매우 크지만 의회의 권한도 꽤 큽니다."