 EGY.999.t:0 알 수 없는 무언가"
 EGY.999.d:0 "최근 카이로 밤마다 사람처럼 생긴 무언가가 돌아다닌다는 소문이 자자합니다. 가끔 머리랑 몸이 분리되어도 다시 붙여서 다니고 걷는 모습이 어정쩡하다는 말도 들립니다. 그를 어떻게 해야 할까요...?"
 EGY.a.999:0 "수사에 들어가라. 누군지 내 눈으로 직접 보겠다."
 EGY.b.999:0 "그냥 냅둬라 환각일 뿐이다."
