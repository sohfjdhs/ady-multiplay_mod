 EGY_the_loyal_gem:0 "충성스러운 보석"
 EGY_the_loyal_gem_desc:0 "우리 이집트는 아직 영국의 보호가 필요합니다. 아직 우리는 자주적인 활동을 할 수 없으며 왕과 의회의 갈등은 최고조를 찍었습니다. 아직 영국의 힘이 우리는 필요합니다..."

