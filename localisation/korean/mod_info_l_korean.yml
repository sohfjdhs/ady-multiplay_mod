 Mod_info_patches:0 "모드 패치내역"
 Mod_lore_patches:0 "§G v1.0.0§!\n\n모드의 첫 등장\n마참내 모드가 등장했어요! 패치 노트는 아래에 있으니 참고 부탁드립니다!\n\n§Y핵심 패치§! :\n 자원이라는 큰 제약을 없에버린 §C연금술§!을 완전히 §R삭제§!했습니다. 모드 개발진은 연금술이 멀티플레이에 큰 영향을 끼치며 이로 인해 밴당한 국가가 생길정도로 문제가 크다고 판단하여 제거하게 되었습니다.\n그래도 있을수 있으니 버그 제보 환영합니다.\n\n§Y이집트 추가§! :\n 원역사 대로라면 존재해야할 §G이집트§!가 패독의 멍청한 짓으로 인해 §R존재하지 않게§! 되었습니다. 멀티플레이 모드에서 이집트를 §Y부활§!시켰으며 그리 효과가 좋진 않을것입니다.\n\n§Y랜덤박스 추가§! :\n 예전 §Y구 멀티서버§!에서도 논의되었던 기능중 하나인 랜덤박스가 드디어 공식적으로 §G출시§!되었습니다. 사용방법은 게임 규칙 설정에서 제일 밑에 보시면 랜덤박스가 있을겁니다.\n\n§Y버그 수정§! :\n-§Y독소전§!이 발발할때 핀란드와 소련이 전쟁을 하지 않았더라도 핀란드가 독일편에서 §R참전§!하는 버그를 수정하였습니다.\n-§G에티오피아§!가 영국으로 §Y망명§!을 가고 프랑스가 연합국에 가입할 시 에티오피아편으로 §R참전§!할 수 있던 버그를 수정했습니다.\n-§G영국§!이 일부 국가를 §R해방이 가능§!한 버그를 수정했습니다.\n-§G스웨덴§!이 멀티 유저수 만큼 민병대를 복사하던 버그를 수정하고 §R무조건 20개§!로 고정했습니다.\n-암트랙(수륙양용장갑차) 설계사 버그를 수정하였습니다.\n-그 외 §Y기타 버그§!들을 수정했습니다.\n\n§Y버프/너프§! :\n§G-§!기갑 대대의 조직력을 §Y7.5% 상승§!시켰습니다.\n§R-§!구축전차의 조직력을 약 §R15%정도 감소§!시키고 §Y생산비용§!을 조금 §R늘렸§!으며 대물과 관통은 유지했습니다.\n§R-§!§Y시암 연구속도§! 버프를 §R대폭 하향§!시켰습니다.\n\n§Y기타§! :\n-많은 국가들이 사라졌습니다. 최적화를 위한 작업입니다.아래는 사라진 국가 목록입니다.\n§g중남미 -> 통합\n에티오피아 분할 -> X\n예멘, 오만, 팔레스타인, 요르단 -> 영국\n시리아, 레바논 -> 프랑스\n네팔, 부탄, 버마 -> 영국령 인도\n네팔, 부탄, 버마 -> 영국령 인도\n중점이 없는 국가들을 위주로 삭제했습니다.§!\n-게임 최적화를 위해 §Y영국 공산 루트§! 중 식민지을 해방하는 대신 §C순응도§!와 §R저항도§!를 추가하기로 결정했습니다.\n-§Y지속적 중점§!들을 일부 추가하였습니다.\n-§Y형성가능 국가§!를 몇 개 추가하였습니다.\n-§G프랑스§!는 §Y알제리§!, §Y라오스§!, §Y캄보디아§!, §Y베트남§!, §Y모로코§!(?) 제외 나머지는 해방 불가로 변경되었습니다."

